<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Absensi Kelas</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .wrapper {
      width: 100%;
      max-width: 450px;
    }

    .header-title {
      text-align: center;
      color: white;
      margin-bottom: 24px;
    }

    .header-title h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .header-title p {
      font-size: 13px;
      opacity: 0.85;
      margin-top: 4px;
    }

    .card {
      background: white;
      padding: 36px 32px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    .form-group {
      margin-bottom: 16px;
      position: relative;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #4a4a6a;
      margin-bottom: 6px;
    }

    label span.required {
      color: #e74c3c;
      margin-left: 2px;
    }

    input, select {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e8e8f0;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      color: #333;
      transition: border-color 0.3s, box-shadow 0.3s;
      outline: none;
      background: #fafafa;
    }

    input:focus, select:focus {
      border-color: #667eea;
      background: white;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.12);
    }

    select {
      cursor: pointer;
    }

    .alasan-group {
      display: none;
    }

    .alasan-group.visible {
      display: block;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 8px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(102, 126, 234, 0.5);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #2ecc71;
      color: white;
      padding: 14px 28px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 8px 24px rgba(46, 204, 113, 0.4);
      transition: transform 0.4s ease;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.error {
      background: #e74c3c;
      box-shadow: 0 8px 24px rgba(231, 76, 60, 0.4);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .divider {
      height: 1px;
      background: #f0f0f5;
      margin: 20px 0;
    }

    .sheet-link {
      text-align: center;
      margin-top: 16px;
    }

    .sheet-link a {
      font-size: 13px;
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .sheet-link a:hover {
      text-decoration: underline;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Date badge */
    .date-badge {
      background: linear-gradient(135deg, #667eea22, #764ba222);
      border: 1px solid #667eea44;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px;
      color: #667eea;
      font-weight: 600;
      text-align: center;
      margin-bottom: 20px;
    }
  </style>
</head>

<body>

  <div class="wrapper">
    <div class="header-title">
      <h1>📋 Absensi Kelas</h1>
      <p>Sistem Kehadiran Siswa Digital</p>
    </div>

    <div class="card">
      <div class="date-badge" id="dateBadge">📅 Memuat tanggal...</div>

      <form id="absenForm" novalidate>

        <div class="form-group">
          <label for="nama">Nama Siswa <span class="required">*</span></label>
          <input type="text" id="nama" placeholder="Masukkan nama lengkap" required />
        </div>

        <div class="form-group">
          <label for="kelas">Kelas <span class="required">*</span></label>
          <input type="text" id="kelas" placeholder="Contoh: X RPL 1" required />
        </div>

        <div class="form-group">
          <label for="tanggal">Tanggal <span class="required">*</span></label>
          <input type="date" id="tanggal" required />
        </div>

        <div class="form-group">
          <label for="status">Status Kehadiran <span class="required">*</span></label>
          <select id="status" required>
            <option value="">— Pilih Status —</option>
            <option value="Hadir">✅ Hadir</option>
            <option value="Tidak Hadir">❌ Tidak Hadir</option>
            <option value="Izin">📝 Izin</option>
            <option value="Sakit">🤒 Sakit</option>
          </select>
        </div>

        <div class="form-group alasan-group" id="alasanGroup">
          <label for="alasan">Alasan</label>
          <input type="text" id="alasan" placeholder="Tulis alasan ketidakhadiran..." />
        </div>

        <div class="divider"></div>

        <button type="submit" class="btn-submit" id="submitBtn">
          Kirim Absensi
        </button>

      </form>

      <div class="sheet-link">
        <a href="https://docs.google.com/spreadsheets/d/1xaFGxkojL77PZnIYEME_6KKOg_O_kXCi8KOFxMpwPig/edit?usp=sharing" target="_blank">
          📊 Lihat Data di Google Sheets
        </a>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>

  <script>
    // ⚠️ GANTI URL INI dengan URL Apps Script kamu setelah deploy
    const APPS_SCRIPT_URL = "YOUR_APPS_SCRIPT_URL";

    // Set today's date
    const today = new Date();
    document.getElementById("tanggal").valueAsDate = today;
    document.getElementById("dateBadge").textContent =
      "📅 " + today.toLocaleDateString("id-ID", { weekday: "long", year: "numeric", month: "long", day: "numeric" });

    // Show/hide alasan field based on status
    document.getElementById("status").addEventListener("change", function () {
      const alasanGroup = document.getElementById("alasanGroup");
      const notPresent = ["Tidak Hadir", "Izin", "Sakit"].includes(this.value);
      alasanGroup.classList.toggle("visible", notPresent);
    });

    // Toast helper
    function showToast(message, isError = false) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.className = "toast" + (isError ? " error" : "");
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 3500);
    }

    // Form submit
    document.getElementById("absenForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const nama = document.getElementById("nama").value.trim();
      const kelas = document.getElementById("kelas").value.trim();
      const tanggal = document.getElementById("tanggal").value;
      const status = document.getElementById("status").value;
      const alasan = document.getElementById("alasan").value.trim();
      const jam = new Date().toLocaleTimeString("id-ID");

      if (!nama || !kelas || !tanggal || !status) {
        showToast("⚠️ Mohon lengkapi semua field wajib!", true);
        return;
      }

      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.innerHTML = '<span class="loading-spinner"></span> Mengirim...';

      const payload = { nama, kelas, tanggal, status, alasan, jam };

      try {
        await fetch(APPS_SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        showToast("✅ Absensi berhasil dikirim!");
        document.getElementById("absenForm").reset();
        document.getElementById("tanggal").valueAsDate = new Date();
        document.getElementById("alasanGroup").classList.remove("visible");

      } catch (err) {
        showToast("❌ Gagal mengirim. Periksa koneksi internet.", true);
      } finally {
        btn.disabled = false;
        btn.innerHTML = "Kirim Absensi";
      }
    });
  </script>

</body>
</html>
